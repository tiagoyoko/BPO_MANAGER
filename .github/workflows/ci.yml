name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  app-and-db-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bpo360-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bpo360-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Run Vitest suite
        run: npm test

      - name: Run database tests
        run: npm run test:db
